name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"] # আপনার ব্রাঞ্চের নাম যদি master হয়, তবে এখানে master লিখবেন
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          # এখানে কোনো cache: 'npm' লাইন থাকবে না। এটি মুছে দেওয়া হয়েছে।
          
      - name: Install dependencies
        run: npm install --no-package-lock # এই লাইনটি আপডেট করা হয়েছে
        
      - name: Build
        run: npm run build
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
