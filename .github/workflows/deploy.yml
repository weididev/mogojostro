name: Build Android APK

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install --no-package-lock

      - name: Build Web App
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Convert to Android App
        run: |
          # শুধুমাত্র প্রয়োজনীয় ক্যাপাসিটর টুলস
          npx cap init "Mogojostro" "com.weididev.mogojostro" --web-dir dist
          npx cap add android
          npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          # ডুপ্লিকেট ক্লাসের এরর এড়াতে সরাসরি বিল্ড কমান্ড
          ./gradlew assembleDebug

      - name: Upload APK for Download
        uses: actions/upload-artifact@v4
        with:
          name: Mogojostro-Android-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
