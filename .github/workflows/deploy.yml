name: Build Android APK

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install --no-package-lock

      - name: Build Web App
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Convert to Android App
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "Mogojostro" "com.weididev.mogojostro" --web-dir dist
          npx cap add android
          npx cap sync android

      # এই নতুন স্টেপটি Kotlin এর ডুপ্লিকেট ক্লাসের এরর ফিক্স করবে
      - name: Fix Kotlin Duplicate Classes Error
        run: |
          echo "dependencies { constraints { implementation('org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22'); implementation('org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22') } }" >> android/app/build.gradle

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK for Download
        uses: actions/upload-artifact@v4
        with:
          name: Mogojostro-Android-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
